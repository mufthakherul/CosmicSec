<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.5" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Background glow -->
  <ellipse cx="100" cy="150" rx="200" ry="200" fill="#22D3EE" fill-opacity="0.04" filter="url(#glow)"/>
  <ellipse cx="1100" cy="150" rx="200" ry="200" fill="#8B5CF6" fill-opacity="0.05" filter="url(#glow)"/>

  <!-- Top / bottom edge accents -->
  <line x1="0" y1="2" x2="1200" y2="2" stroke="url(#accent)" stroke-opacity="0.4" stroke-width="2"/>
  <line x1="0" y1="298" x2="1200" y2="298" stroke="url(#accent)" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Logo -->
  <g transform="translate(60, 60)">
    <path d="M90 6L162 35V88C162 130 128 163 90 174C52 163 18 130 18 88V35L90 6Z"
      stroke="url(#accent)" stroke-width="8" fill="#0B1220" stroke-linejoin="round"/>
    <path d="M64 91L83 110L122 70"
      stroke="url(#accent)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="240" y="130" fill="#F1F5F9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="-1">CosmicSec</text>

  <!-- Tagline -->
  <text x="242" y="178" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24">Universal Cybersecurity Intelligence Platform</text>

  <!-- Pills right side -->
  <g transform="translate(820, 90)">
    <rect x="0" y="0" width="135" height="36" rx="9" fill="#0EA5E9" fill-opacity="0.10" stroke="#0EA5E9" stroke-opacity="0.35" stroke-width="1"/>
    <text x="68" y="23" fill="#38BDF8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" text-anchor="middle">🛡️ 14 Services</text>

    <rect x="0" y="48" width="135" height="36" rx="9" fill="#8B5CF6" fill-opacity="0.10" stroke="#8B5CF6" stroke-opacity="0.35" stroke-width="1"/>
    <text x="68" y="71" fill="#A78BFA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" text-anchor="middle">🤖 AI-Powered</text>

    <rect x="150" y="0" width="135" height="36" rx="9" fill="#10B981" fill-opacity="0.10" stroke="#10B981" stroke-opacity="0.35" stroke-width="1"/>
    <text x="218" y="23" fill="#34D399" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" text-anchor="middle">⚡ React 19</text>

    <rect x="150" y="48" width="135" height="36" rx="9" fill="#F59E0B" fill-opacity="0.08" stroke="#F59E0B" stroke-opacity="0.35" stroke-width="1"/>
    <text x="218" y="71" fill="#FCD34D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" text-anchor="middle">🦀 Rust Ingest</text>
  </g>
</svg>
