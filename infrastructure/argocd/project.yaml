apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: cosmicsec
  namespace: argocd
spec:
  description: CosmicSec GitOps project
  sourceRepos:
    - https://github.com/mufthakherul/CosmicSec.git
  destinations:
    - namespace: cosmicsec
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
