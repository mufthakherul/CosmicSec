apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cosmicsec
  namespace: argocd
spec:
  project: cosmicsec
  source:
    repoURL: https://github.com/mufthakherul/CosmicSec.git
    targetRevision: main
    path: helm/cosmicsec
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: cosmicsec
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
