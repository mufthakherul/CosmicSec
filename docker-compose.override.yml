# Local development overrides
# This file is automatically used by Docker Compose in development.

services:
  api-gateway:
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://cosmicsec:cosmicsec_dev_password@postgres:5432/cosmicsec
      - REDIS_URL=redis://:cosmicsec_redis_password@redis:6379/0

  auth-service:
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://cosmicsec:cosmicsec_dev_password@postgres:5432/cosmicsec
      - REDIS_URL=redis://:cosmicsec_redis_password@redis:6379/0

  scan-service:
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://cosmicsec:cosmicsec_dev_password@postgres:5432/cosmicsec
      - REDIS_URL=redis://:cosmicsec_redis_password@redis:6379/0
      - MONGODB_URL=mongodb://cosmicsec:cosmicsec_mongo_password@mongodb:27017/cosmicsec
      - RABBITMQ_URL=amqp://cosmicsec:cosmicsec_rabbitmq_password@rabbitmq:5672/

  ai-service:
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - ENVIRONMENT=development

  ingest:
    environment:
      - DATABASE_URL=postgresql://cosmicsec:cosmicsec_dev_password@postgres:5432/cosmicsec
      - REDIS_URL=redis://:cosmicsec_redis_password@redis:6379/0

  frontend:
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_API_URL=http://localhost:8000
      - NODE_ENV=development

  postgres:
    environment:
      - POSTGRES_INITDB_ARGS=-c log_statement=all -c log_duration=on
      - POSTGRES_PASSWORD=cosmicsec_dev_password

  redis:
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass cosmicsec_redis_password --loglevel notice

  mongodb:
    command: mongod --auth
