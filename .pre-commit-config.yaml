repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic
          - types-requests

  - repo: local
    hooks:
      - id: frontend-eslint
        name: frontend-eslint
        entry: bash -c 'cd frontend && files=(); for file in "$@"; do rel="${file#frontend/}"; [ -f "$rel" ] && files+=("$rel"); done; [ ${#files[@]} -eq 0 ] || npx eslint --max-warnings 20 "${files[@]}"' --
        language: system
        files: ^frontend/.*\.(ts|tsx)$
      - id: frontend-prettier
        name: frontend-prettier
        entry: bash -c 'cd frontend && files=(); for file in "$@"; do rel="${file#frontend/}"; [ -f "$rel" ] && files+=("$rel"); done; [ ${#files[@]} -eq 0 ] || npx prettier --write "${files[@]}"' --
        language: system
        files: ^frontend/.*\.(ts|tsx|css|js|jsx|json|md|yml|yaml)$
