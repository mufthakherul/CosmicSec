<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.7" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="500" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="60" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Background glow blobs -->
  <ellipse cx="160" cy="300" rx="300" ry="300" fill="#22D3EE" fill-opacity="0.03" filter="url(#glow)"/>
  <ellipse cx="1050" cy="300" rx="280" ry="280" fill="#8B5CF6" fill-opacity="0.05" filter="url(#glow)"/>

  <!-- Border frame -->
  <rect x="30" y="30" width="1140" height="570" rx="20" fill="none" stroke="#1E293B" stroke-width="1.5"/>
  <rect x="32" y="32" width="1136" height="566" rx="18" fill="none" stroke="url(#accent)" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Logo shield -->
  <g transform="translate(80, 175)">
    <path d="M140 10L250 55V140C250 202 204 254 140 274C76 254 30 202 30 140V55L140 10Z"
      stroke="url(#accent)" stroke-width="12" fill="#0B1220" stroke-linejoin="round"/>
    <path d="M99 143L130 174L194 108"
      stroke="url(#accent)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="140" cy="143" r="82" stroke="url(#accent)" stroke-opacity="0.12" stroke-width="1"/>
  </g>

  <!-- Text content -->
  <text x="360" y="230" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="80" font-weight="800" letter-spacing="-2">CosmicSec</text>
  <text x="362" y="295" fill="#64748B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28">Universal Cybersecurity Intelligence Platform</text>
  <text x="362" y="345" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">AI-Powered · Hybrid Architecture · CLI Agent · Enterprise SOC</text>

  <!-- Divider -->
  <line x1="362" y1="380" x2="860" y2="380" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Feature pills -->
  <rect x="362" y="400" width="130" height="38" rx="10" fill="#0EA5E9" fill-opacity="0.10" stroke="#0EA5E9" stroke-opacity="0.35" stroke-width="1"/>
  <text x="427" y="425" fill="#38BDF8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle">14 Services</text>

  <rect x="506" y="400" width="110" height="38" rx="10" fill="#8B5CF6" fill-opacity="0.10" stroke="#8B5CF6" stroke-opacity="0.35" stroke-width="1"/>
  <text x="561" y="425" fill="#A78BFA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle">4 SDKs</text>

  <rect x="630" y="400" width="132" height="38" rx="10" fill="#10B981" fill-opacity="0.10" stroke="#10B981" stroke-opacity="0.35" stroke-width="1"/>
  <text x="696" y="425" fill="#34D399" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle">React 19 + Vite</text>

  <rect x="778" y="400" width="136" height="38" rx="10" fill="#F59E0B" fill-opacity="0.08" stroke="#F59E0B" stroke-opacity="0.35" stroke-width="1"/>
  <text x="846" y="425" fill="#FCD34D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle">FastAPI + Rust</text>

  <!-- GitHub URL bottom right -->
  <text x="1130" y="590" fill="#334155" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" text-anchor="end">github.com/mufthakherul/CosmicSec</text>
</svg>
