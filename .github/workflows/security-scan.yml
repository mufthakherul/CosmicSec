# CosmicSec — Security Scanning CI Workflow (Cross-cutting)
# Runs SAST, dependency review, secret scanning, and integrity checks.

name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "frontend/**"
      - "scripts/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - "Dockerfile"
      - "docker-compose*.yml"
      - ".github/workflows/security-scan.yml"
  pull_request:
    paths:
      - "services/**"
      - "frontend/**"
      - "scripts/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - "Dockerfile"
      - "docker-compose*.yml"
      - ".github/workflows/security-scan.yml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bandit-sast:
    name: Python SAST (Bandit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: |
          bandit -r services/ \
            -x services/common/db.py \
            -ll \
            --format json \
            --output /tmp/bandit-results.json || true
          bandit -r services/ -ll -x services/common/db.py || true

      - name: Upload Bandit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sast-results
          path: /tmp/bandit-results.json
          if-no-files-found: warn

  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Trivy (filesystem — critical & high)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

  frontend-eslint-security:
    name: Frontend SAST (ESLint security plugin)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint security profile
        run: npm run lint:security

  sbom:
    name: Generate SBOM (Syft)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate CycloneDX SBOM
        run: syft dir:. -o cyclonedx-json > sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          if-no-files-found: error

  sri-check:
    name: SRI validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate Subresource Integrity tags
        run: python scripts/ci/check_sri.py

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event.before != '0000000000000000000000000000000000000000'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          base-ref: ${{ (github.event_name == 'pull_request') && github.event.pull_request.base.sha || github.event.before }}
          head-ref: ${{ github.sha }}
          fail-on-severity: critical
          comment-summary-in-pr: always

  trufflehog-secrets:
    name: Secrets Scan (TruffleHog)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        if: github.event_name == 'pull_request' || github.event.before != '0000000000000000000000000000000000000000'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.sha }}
          extra_args: --results=verified,unknown

  security-summary:
    name: Security summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - bandit-sast
      - trivy-fs
      - frontend-eslint-security
      - sbom
      - sri-check
      - dependency-review
      - trufflehog-secrets
    steps:
      - name: Publish security summary
        run: |
          {
            echo "## Security Scan Summary"
            echo "- Bandit: ${{ needs.bandit-sast.result }}"
            echo "- Trivy FS: ${{ needs.trivy-fs.result }}"
            echo "- Frontend security lint: ${{ needs.frontend-eslint-security.result }}"
            echo "- SBOM: ${{ needs.sbom.result }}"
            echo "- SRI check: ${{ needs.sri-check.result }}"
            echo "- Dependency review: ${{ needs.dependency-review.result }}"
            echo "- TruffleHog: ${{ needs.trufflehog-secrets.result }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on required security gate failures
        if: |
          needs.sri-check.result == 'failure' ||
          needs.dependency-review.result == 'failure'
        run: exit 1
