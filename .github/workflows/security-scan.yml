name: Security Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" aquasec/trivy:latest fs \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --ignore-unfixed \
            /src
