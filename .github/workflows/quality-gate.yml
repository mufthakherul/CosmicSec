name: Quality Gate

on:
  pull_request:
    paths:
      - "services/**"
      - "cli/**"
      - "frontend/**"
      - "scripts/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/quality-gate.yml"
  push:
    branches: [main]
    paths:
      - "services/**"
      - "cli/**"
      - "frontend/**"
      - "scripts/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/quality-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-static-analysis:
    name: Python static analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy ruff vulture radon

      - name: mypy strict (best effort)
        run: mypy services/ --ignore-missing-imports --no-error-summary || true

      - name: Ruff import sorting (best effort)
        run: ruff check . --select I || true

      - name: Dead code detection (best effort)
        run: vulture services cli broker --min-confidence 80 || true

      - name: Complexity analysis (best effort)
        run: radon cc services cli -s -n B || true

  cli-and-backend:
    name: CLI + Backend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify man page sync
        run: python scripts/generate-cli-manpage.py --check

      - name: Run CLI tests
        run: python -m pytest cli/agent/tests -q

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build app
        run: npm run build

      - name: Build Storybook
        run: npm run build-storybook

  quality-summary:
    name: Quality summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - python-static-analysis
      - cli-and-backend
      - frontend
    steps:
      - name: Publish summary
        run: |
          {
            echo "## Quality Gate Summary"
            echo "- Python static analysis: ${{ needs.python-static-analysis.result }}"
            echo "- CLI and backend checks: ${{ needs.cli-and-backend.result }}"
            echo "- Frontend checks: ${{ needs.frontend.result }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if required checks failed
        if: |
          needs.cli-and-backend.result == 'failure' ||
          needs.frontend.result == 'failure'
        run: exit 1
