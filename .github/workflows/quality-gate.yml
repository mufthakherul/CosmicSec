name: Quality Gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  cli-and-backend:
    name: CLI + Backend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify man page sync
        run: python scripts/generate-cli-manpage.py --check

      - name: Run CLI tests
        run: python -m pytest cli/agent/tests -q

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build app
        run: npm run build

      - name: Build Storybook
        run: npm run build-storybook
