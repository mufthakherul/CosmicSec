name: Docs Suite - Developer & Development

on:
  workflow_dispatch:
  # Auto-run docs generation when core docs/doc-generator inputs change on main.
  push:
    branches: [main]
    paths:
      - "docs/**/*.md"
      - "!docs/generated/**/*.md"
      - "scripts/ci/generate_docs_bundle.py"
      - ".github/workflows/docs-developer-development.yml"
      - ".github/workflows/_reusable-docs-suite.yml"
  schedule:
    - cron: "30 2 * * 2"

permissions:
  contents: write
  pull-requests: write

jobs:
  docs-developer:
    uses: ./.github/workflows/_reusable-docs-suite.yml
    with:
      profile: developer
      output_file: docs/generated/DEVELOPER_DEVELOPMENT_DETAILED.md
      scan_output: .artifacts/docs-scan-developer.json
      scan_artifact_name: docs-scan-developer
      commit_message: "docs(dev): refresh developer and development docs"
      run_label: developer/development
