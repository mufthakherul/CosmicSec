name: Dependency Update Guard

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependency-update-guard-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-dependabot-pr:
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run targeted validation for dependency PR
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest tests/test_docker_env.py -q
          npm --prefix frontend ci
          npm --prefix frontend run test

      - name: Merge safe updates only when checks are green
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const headSha = context.payload.pull_request.head.sha;

            const status = await github.rest.repos.getCombinedStatusForRef({
              owner,
              repo,
              ref: headSha,
            });

            if (status.data.state !== "success") {
              core.info(`Skipping merge: combined status is ${status.data.state}`);
              return;
            }

            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number,
              merge_method: "squash",
            });

      - name: Dependency guard summary
        run: |
          {
            echo "## Dependency Update Guard"
            echo "- Dependency PR type: ${{ steps.metadata.outputs.update-type }}"
            echo "- Safe patch/minor updates are auto-merged after targeted validation"
          } >> "$GITHUB_STEP_SUMMARY"
