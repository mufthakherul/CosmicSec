name: SQL Injection Dynamic Scan

on:
  pull_request:
    paths:
      - "services/**"
      - "docker-compose*.yml"
      - ".github/workflows/sql-injection-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sql-injection-scan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sqlmap:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      REDIS_PASSWORD: ci-redis-password
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Start stack
        run: docker compose up -d api-gateway auth-service scan-service redis postgres

      - name: Wait for API gateway
        run: |
          for _ in {1..60}; do
            if curl -fsS http://localhost:8000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Gateway not healthy in time after 60 attempts" >&2
          docker compose logs --tail=200 api-gateway auth-service scan-service || true
          exit 1

      - name: Run sqlmap smoke scan
        run: |
          docker run --rm --network host \
            -v "$PWD:/workdir" \
            mrxpalmeiras/sqlmap \
            -u "http://localhost:8000/api/auth/login" \
            --method POST \
            --data "email=test@example.com&password=test123" \
            --batch \
            --level=2 \
            --risk=1 \
            --random-agent \
            --output-dir=/workdir/.artifacts/sqlmap

      - name: Upload sqlmap artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sqlmap-report
          path: .artifacts/sqlmap
          if-no-files-found: warn

      - name: Shutdown stack
        if: always()
        run: docker compose down -v

      - name: Publish summary
        if: always()
        run: |
          {
            echo "## SQL Injection Dynamic Scan"
            echo "- sqlmap smoke scan executed against auth login endpoint"
            echo "- Artifacts uploaded when present"
          } >> "$GITHUB_STEP_SUMMARY"
