name: Staging Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "frontend/**"
      - "services/**"
      - "Dockerfile"
      - "docker-compose*.yml"
      - ".github/workflows/staging-preview.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: staging-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    outputs:
      preview-url: ${{ steps.meta.outputs.preview_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build preview image
        run: docker build -t cosmicsec-preview:${{ github.sha }} .

      - name: Generate preview metadata
        id: meta
        run: |
          PREVIEW_URL="https://preview.example.internal/${{ github.event.pull_request.number || github.run_id }}"
          echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"

      - name: Preview deployment scaffold
        run: |
          echo "Configure cloud provider CLI here (Azure/AWS/GCP)."
          echo "Deploy image cosmicsec-preview:${{ github.sha }} to staging namespace."
          echo "Emit preview URL as workflow output."

      - name: Comment PR with preview status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "✅ Staging preview workflow executed.",
              "",
              `Preview URL: ${process.env.PREVIEW_URL}`,
              "",
              "This repository is configured with a deployment scaffold.",
              "Wire provider-specific deployment commands in `.github/workflows/staging-preview.yml` to publish per-PR preview URLs."
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
        env:
          PREVIEW_URL: ${{ steps.meta.outputs.preview_url }}

      - name: Publish step summary
        run: |
          {
            echo "## Staging Preview Summary"
            echo "- Preview image: `cosmicsec-preview:${{ github.sha }}`"
            echo "- Preview URL: `${{ steps.meta.outputs.preview_url }}`"
          } >> "$GITHUB_STEP_SUMMARY"
