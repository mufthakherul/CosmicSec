name: Experience Gates

on:
  pull_request:
  workflow_dispatch:

jobs:
  performance-regression:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run benchmark guard
        run: python scripts/ci/perf_guard.py --baseline .github/perf-baseline.json --max-regression 10

  visual-regression:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run visual regression suite
        run: npx playwright test --grep "@visual"

      - name: Upload visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-artifacts
          path: |
            frontend/test-results
            frontend/playwright-report
          if-no-files-found: warn

  axe-a11y-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run preview server
        run: nohup npm run preview -- --host 0.0.0.0 --port 4173 > /tmp/frontend-preview.log 2>&1 &

      - name: Install axe CLI
        run: npm i -g @axe-core/cli

      - name: Run axe-core audit
        run: axe http://127.0.0.1:4173 --exit
