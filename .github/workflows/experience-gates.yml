name: Experience Gates

on:
  pull_request:
    paths:
      - "frontend/**"
      - "scripts/ci/**"
      - "services/**"
      - ".github/perf-baseline.json"
      - ".github/workflows/experience-gates.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: experience-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  performance-regression:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run benchmark guard
        continue-on-error: true
        run: python scripts/ci/perf_guard.py --baseline .github/perf-baseline.json --max-regression 10

  visual-regression:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run visual regression suite
        run: npx playwright test --grep "@visual" --pass-with-no-tests

      - name: Upload visual artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-visual-artifacts
          path: |
            frontend/test-results
            frontend/playwright-report
          if-no-files-found: warn

  axe-a11y-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run preview server
        run: nohup npm run preview -- --host 0.0.0.0 --port 4173 > /tmp/frontend-preview.log 2>&1 &

      - name: Install axe CLI
        run: npm i -g @axe-core/cli

      - name: Run axe-core audit
        run: axe http://127.0.0.1:4173 --exit

  experience-summary:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - performance-regression
      - visual-regression
      - axe-a11y-audit
    steps:
      - name: Publish summary
        run: |
          {
            echo "## Experience Gates Summary"
            echo "- Performance regression: ${{ needs.performance-regression.result }}"
            echo "- Visual regression: ${{ needs.visual-regression.result }}"
            echo "- A11y audit: ${{ needs.axe-a11y-audit.result }}"
          } >> "$GITHUB_STEP_SUMMARY"
