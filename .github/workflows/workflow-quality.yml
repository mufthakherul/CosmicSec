name: Workflow Quality

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "scripts/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.12

      - name: YAML sanity check
        run: |
          python -m pip install --upgrade yamllint
          yamllint -d '{extends: default, rules: {line-length: disable, document-start: disable, truthy: disable}}' .github/workflows

      - name: Workflow quality summary
        run: |
          {
            echo "## Workflow Quality"
            echo "- actionlint and yamllint completed"
          } >> "$GITHUB_STEP_SUMMARY"
