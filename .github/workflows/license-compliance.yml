name: License Compliance

on:
  pull_request:
    paths:
      - "requirements*.txt"
      - "pyproject.toml"
      - "frontend/package*.json"
      - ".github/workflows/license-compliance.yml"
  push:
    branches: [main]
    paths:
      - "requirements*.txt"
      - "pyproject.toml"
      - "frontend/package*.json"
      - ".github/workflows/license-compliance.yml"
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: license-compliance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  license-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-licenses
          npm --prefix frontend ci

      - name: Generate Python license report
        run: pip-licenses --format=json --output-file .artifacts/python-licenses.json

      - name: Generate frontend license report
        run: |
          mkdir -p .artifacts
          npx --yes license-checker-rseidelsohn --production --json --start frontend > .artifacts/frontend-licenses.json

      - name: Upload license reports
        uses: actions/upload-artifact@v7
        with:
          name: dependency-license-reports
          path: .artifacts/*licenses.json
          if-no-files-found: error

      - name: License summary
        run: |
          {
            echo "## License Compliance"
            echo "- Generated Python and frontend dependency license inventories"
            echo "- Review artifact for policy enforcement/allowlisting"
          } >> "$GITHUB_STEP_SUMMARY"
