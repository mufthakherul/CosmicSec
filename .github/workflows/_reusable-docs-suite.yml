name: Reusable Docs Suite Generator

on:
  workflow_call:
    inputs:
      profile:
        required: true
        type: string
      output_file:
        required: true
        type: string
      scan_output:
        required: true
        type: string
      scan_artifact_name:
        required: true
        type: string
      commit_message:
        required: true
        type: string
      run_label:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-suite-pr
  cancel-in-progress: false

jobs:
  generate-docs:
    name: Generate docs (${{ inputs.profile }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Generate docs bundle
        run: |
          python scripts/ci/generate_docs_bundle.py \
            --profile "${{ inputs.profile }}" \
            --output "${{ inputs.output_file }}" \
            --scan-output "${{ inputs.scan_output }}"

      - name: Upload docs scan artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.scan_artifact_name }}
          path: ${{ inputs.scan_output }}
          if-no-files-found: error

      - name: Publish docs run summary
        run: |
          {
            echo "## Docs Suite Result"
            echo "- Profile: ${{ inputs.profile }}"
            echo "- Output: ${{ inputs.output_file }}"
            echo "- Scan artifact: ${{ inputs.scan_artifact_name }}"
            echo "- Trigger: ${{ github.event_name }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update shared docs PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/docs-suite
          delete-branch: false
          commit-message: ${{ inputs.commit_message }}
          title: "docs: automated documentation suite refresh"
          body: |
            Automated docs suite refresh (${{ inputs.run_label }} pass).

            Included in this PR branch:
            - Full markdown scan of repository docs
            - Regenerated profile-specific documentation output
            - Any additional docs updates from companion docs-suite workflows

            This PR is intentionally shared across docs-suite workflows.
          labels: |
            automation
            documentation
          add-paths: |
            docs/generated/
            .artifacts/
