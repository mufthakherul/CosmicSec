name: Build

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "docker-compose*.yml"
      - "services/**/Dockerfile"
      - "services/**"
      - "cosmicsec_platform/**"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - "docker-compose*.yml"
      - "services/**/Dockerfile"
      - "services/**"
      - "cosmicsec_platform/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Docker build (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: base
            file: Dockerfile
            tag: cosmicsec:ci
          - name: api-gateway
            file: services/api_gateway/Dockerfile
            tag: cosmicsec-api-gateway:ci
          - name: auth-service
            file: services/auth_service/Dockerfile
            tag: cosmicsec-auth-service:ci
          - name: scan-service
            file: services/scan_service/Dockerfile
            tag: cosmicsec-scan-service:ci
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image with layer cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.file }}
          tags: ${{ matrix.image.tag }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan (critical/high)
        if: matrix.image.name == 'base'
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: cosmicsec:ci
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy image SARIF
        if: matrix.image.name == 'base' && always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  build-summary:
    name: Build workflow summary
    runs-on: ubuntu-latest
    if: always()
    needs: [docker-build]
    steps:
      - name: Publish summary
        run: |
          {
            echo "## Build Workflow Summary"
            echo "- Docker matrix build result: `${{ needs.docker-build.result }}`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if matrix build failed
        if: needs.docker-build.result == 'failure'
        run: exit 1
