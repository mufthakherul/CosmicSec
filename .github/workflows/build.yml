name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build base image
        run: docker build -t cosmicsec:ci .

      - name: Build service images
        run: |
          docker build -f services/api_gateway/Dockerfile -t cosmicsec-api-gateway:ci .
          docker build -f services/auth_service/Dockerfile -t cosmicsec-auth-service:ci .
          docker build -f services/scan_service/Dockerfile -t cosmicsec-scan-service:ci .
