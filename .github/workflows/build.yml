name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build base image
        run: docker build -t cosmicsec:ci .

      - name: Build service images
        run: |
          docker build -f services/api_gateway/Dockerfile -t cosmicsec-api-gateway:ci .
          docker build -f services/auth_service/Dockerfile -t cosmicsec-auth-service:ci .
          docker build -f services/scan_service/Dockerfile -t cosmicsec-scan-service:ci .

      - name: Trivy image scan (critical/high)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cosmicsec:ci
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
