name: Docs Suite - Production Status & Progress

on:
  workflow_dispatch:
  # Auto-run docs generation when core docs/doc-generator inputs change on main.
  push:
    branches: [main]
    paths:
      - "docs/**/*.md"
      - "!docs/generated/**/*.md"
      - "scripts/ci/generate_docs_bundle.py"
      - ".github/workflows/docs-production-status-progress.yml"
      - ".github/workflows/_reusable-docs-suite.yml"
  schedule:
    - cron: "45 2 * * 2"

permissions:
  contents: write
  pull-requests: write

jobs:
  docs-production:
    uses: ./.github/workflows/_reusable-docs-suite.yml
    with:
      profile: production
      output_file: docs/generated/PRODUCTION_STATUS_PROGRESS_DETAILED.md
      scan_output: .artifacts/docs-scan-production.json
      scan_artifact_name: docs-scan-production
      commit_message: "docs(prod): refresh production status and progress docs"
      run_label: production/status
