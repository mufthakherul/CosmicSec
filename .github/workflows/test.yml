name: Test

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "tests/**"
      - "frontend/**"
      - "cli/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "services/**"
      - "tests/**"
      - "frontend/**"
      - "cli/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/test.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-test:
    name: Python Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run backend tests
        # Coverage threshold is enforced in dedicated coverage-report.yml workflow.
        run: pytest tests/ -v --cov=services --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=0

      - name: Upload backend coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v5
        with:
          name: backend-coverage-xml
          path: coverage.xml
          if-no-files-found: error

  alembic-migration-check:
    name: Alembic Migration Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render migration SQL offline
        env:
          DATABASE_URL: sqlite:///./ci.db
        run: |
          alembic upgrade head --sql > /tmp/alembic-upgrade.sql
          test -s /tmp/alembic-upgrade.sql

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

  playwright-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-artifacts
          path: |
            frontend/test-results
            frontend/playwright-report
          if-no-files-found: warn

  python-lint:
    name: Python Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install Ruff
        run: pip install ruff

      - name: Lint with Ruff (best effort)
        run: ruff check . --output-format=github || true

  python-typecheck:
    name: Python Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy types-redis

      - name: Run mypy (best effort)
        run: mypy services/ --ignore-missing-imports --no-error-summary --warn-unused-ignores || true

  frontend-typecheck:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  frontend-bundle-size:
    name: Frontend Bundle Size Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and check bundle size
        run: |
          npm run build
          python3 - <<'EOF'
          import os, sys
          dist_dir = "dist/assets"
          max_chunk = 500 * 1024
          oversized = []
          for f in os.listdir(dist_dir):
              if f.endswith(".js"):
                  size = os.path.getsize(os.path.join(dist_dir, f))
                  if size > max_chunk:
                      oversized.append((f, size))
          if oversized:
              for name, size in oversized:
                  print(f"OVERSIZED: {name} — {size/1024:.1f} KB (limit: 500 KB)")
              sys.exit(1)
          print("Bundle size check PASSED — all chunks within limit")
          EOF

  test-summary:
    name: Test workflow summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - python-test
      - alembic-migration-check
      - frontend-test
      - playwright-e2e
      - python-lint
      - python-typecheck
      - frontend-typecheck
      - frontend-bundle-size
    steps:
      - name: Publish summary
        run: |
          {
            echo "## Test Workflow Summary"
            echo "- Python tests: ${{ needs.python-test.result }}"
            echo "- Alembic check: ${{ needs.alembic-migration-check.result }}"
            echo "- Frontend tests: ${{ needs.frontend-test.result }}"
            echo "- Playwright e2e: ${{ needs.playwright-e2e.result }}"
            echo "- Ruff lint: ${{ needs.python-lint.result }}"
            echo "- mypy typecheck: ${{ needs.python-typecheck.result }}"
            echo "- Frontend typecheck: ${{ needs.frontend-typecheck.result }}"
            echo "- Bundle-size guard: ${{ needs.frontend-bundle-size.result }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on required job failures
        if: |
          needs.python-test.result == 'failure' ||
          needs.alembic-migration-check.result == 'failure' ||
          needs.frontend-test.result == 'failure' ||
          needs.frontend-typecheck.result == 'failure' ||
          needs.frontend-bundle-size.result == 'failure'
        run: exit 1
