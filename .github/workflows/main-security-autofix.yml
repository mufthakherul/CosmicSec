name: Main Security Auto-Fix

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  security-quality-scan:
    name: Security, dependency, and quality checks
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python,javascript-typescript
          queries: security-extended,security-and-quality

      - name: Autobuild for CodeQL
        uses: github/codeql-action/autobuild@v4

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python,javascript-typescript"

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-main.sarif"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-main.sarif
          category: trivy-main

      - name: Run Bandit scan (best effort)
        run: |
          bandit -r services/ \
            -x services/common/db.py \
            -ll \
            --format json \
            --output bandit-main.json || true
          bandit -r services/ -ll -x services/common/db.py || true

      - name: Upload Bandit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-main-results
          path: bandit-main.json
          if-no-files-found: warn

      - name: Run pip-audit (best effort)
        run: pip-audit -r requirements.txt || true

      - name: Run npm audit (best effort)
        run: npm --prefix frontend audit --audit-level=high || true

      - name: Confirm Dependabot config
        run: test -f .github/dependabot.yml

  autofix-and-pr:
    name: Auto-fix and open PR
    runs-on: ubuntu-latest
    needs: security-quality-scan
    if: always()
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pre-commit ruff pip-audit
          npm --prefix frontend ci

      - name: Apply safe autofixes
        run: |
          ruff check . --fix || true
          ruff format . || true
          pre-commit run --all-files || true
          npm --prefix frontend run format || true
          pip-audit -r requirements.txt --fix || true
          npm --prefix frontend audit fix || true

      - name: Create pull request for automated improvements
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/main-security-autofix-${{ github.run_id }}
          commit-message: "chore: automated security and quality autofixes"
          title: "chore: automated security and quality autofixes"
          body: |
            This pull request was generated automatically after a push to `main`.

            Included automated tasks:
            - CodeQL analysis
            - Trivy filesystem scan
            - Bandit Python SAST
            - pip and npm dependency audits
            - Safe autofix attempts (Ruff, pre-commit, npm audit fix, pip-audit fix)

            Notes:
            - Some findings still require manual remediation.
            - Dependabot updates continue to run via `.github/dependabot.yml`.
          labels: |
            automation
            security
            dependencies
            quality
          add-paths: |
            .
