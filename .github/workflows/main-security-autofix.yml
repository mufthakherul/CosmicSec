name: Main Security Auto-Fix

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "frontend/**"
      - "scripts/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - "Dockerfile"
      - ".github/workflows/main-security-autofix.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-security-autofix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-quality-scan:
    name: Security, dependency, and quality checks
    runs-on: ubuntu-latest
    env:
      BANDIT_EXCLUDE_PATHS: services/common/db.py
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python,javascript-typescript
          queries: security-extended,security-and-quality

      - name: Autobuild for CodeQL
        uses: github/codeql-action/autobuild@v4

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:python,javascript-typescript

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-main.sarif
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-main.sarif
          category: trivy-main

      - name: Run Bandit scan (best effort)
        run: |
          bandit -r services/ \
            -x "$BANDIT_EXCLUDE_PATHS" \
            -ll \
            --format json \
            --output bandit-main.json || true
          bandit -r services/ -ll -x "$BANDIT_EXCLUDE_PATHS" || true

      - name: Upload Bandit artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: bandit-main-results
          path: bandit-main.json
          if-no-files-found: warn

      - name: Run pip-audit (best effort)
        run: pip-audit -r requirements.txt || true

      - name: Run npm audit (best effort)
        run: npm --prefix frontend audit --audit-level=high || true

      - name: Confirm Dependabot config
        run: test -f .github/dependabot.yml

  autofix-and-pr:
    name: Auto-fix and open PR
    runs-on: ubuntu-latest
    needs: security-quality-scan
    if: ${{ !failure() && !cancelled() }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pre-commit ruff pip-audit
          npm --prefix frontend ci

      - name: Apply safe autofixes
        run: |
          set +e
          failures=0

          ruff check . --fix
          rc=$?
          [ "$rc" -eq 0 ] || { echo "::warning::ruff check --fix failed ($rc)"; failures=$((failures + 1)); }

          ruff format .
          rc=$?
          [ "$rc" -eq 0 ] || { echo "::warning::ruff format failed ($rc)"; failures=$((failures + 1)); }

          pre-commit run --all-files
          rc=$?
          [ "$rc" -eq 0 ] || { echo "::warning::pre-commit autofix failed ($rc)"; failures=$((failures + 1)); }

          npm --prefix frontend run format
          rc=$?
          [ "$rc" -eq 0 ] || { echo "::warning::frontend format failed ($rc)"; failures=$((failures + 1)); }

          [ "$failures" -eq 0 ] || echo "::warning::Autofix phase completed with $failures failing step(s)"

      - name: Create pull request for automated improvements
        # v6 pinned SHA for supply-chain integrity.
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          branch: automation/main-security-autofix-${{ github.run_id }}
          commit-message: "chore: automated security and quality autofixes"
          title: "chore: automated security and quality autofixes"
          body: |
            This pull request was generated automatically after a push to `main`.

            Included automated tasks:
            - CodeQL analysis
            - Trivy filesystem scan
            - Bandit Python SAST
            - pip and npm dependency audits
            - Safe autofix attempts (Ruff formatting/import fixes, pre-commit hooks)

            Notes:
            - Some findings still require manual remediation.
            - Dependabot updates continue to run via `.github/dependabot.yml`.
          labels: |
            automation
            security
            dependency-audit
            quality
          add-paths: |
            .
