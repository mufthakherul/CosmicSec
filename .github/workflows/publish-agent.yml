name: Publish cosmicsec-agent to PyPI

on:
  push:
    tags:
      - "agent/v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-agent-${{ github.ref }}
  cancel-in-progress: false

jobs:
  binaries:
    name: Build standalone binaries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            cli/agent/pyproject.toml
            requirements.txt

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e cli/agent

      - name: Build single-file binary
        run: pyinstaller --onefile --name cosmicsec-agent cli/agent/cosmicsec_agent/main.py

      - name: Upload binary artifact
        uses: actions/upload-artifact@v5
        with:
          name: cosmicsec-agent-${{ matrix.os }}
          path: |
            dist/cosmicsec-agent
            dist/cosmicsec-agent.exe
          if-no-files-found: warn

  publish:
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            cli/agent/pyproject.toml
            requirements.txt

      - name: Install build dependencies
        run: pip install build

      - name: Verify CLI man page is synced
        run: python scripts/generate-cli-manpage.py --check

      - name: Build package
        working-directory: cli/agent
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/agent/dist/
          skip-existing: true

      - name: Publish summary
        run: |
          {
            echo "## Agent Publish Summary"
            echo "- Built multi-OS binaries"
            echo "- Published Python package to PyPI (skip-existing enabled)"
          } >> "$GITHUB_STEP_SUMMARY"
