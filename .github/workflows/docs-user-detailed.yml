name: Docs Suite - User Detailed

on:
  workflow_dispatch:
  # Auto-run docs generation when core docs/doc-generator inputs change on main.
  push:
    branches: [main]
    paths:
      - "docs/**/*.md"
      - "!docs/generated/**/*.md"
      - "scripts/ci/generate_docs_bundle.py"
      - ".github/workflows/docs-user-detailed.yml"
      - ".github/workflows/_reusable-docs-suite.yml"
  schedule:
    - cron: "15 2 * * 2"

permissions:
  contents: write
  pull-requests: write

jobs:
  docs-user:
    uses: ./.github/workflows/_reusable-docs-suite.yml
    with:
      profile: user
      output_file: docs/generated/USER_GUIDE_DETAILED.md
      scan_output: .artifacts/docs-scan-user.json
      scan_artifact_name: docs-scan-user
      commit_message: "docs(user): refresh detailed user docs"
      run_label: user-focused
