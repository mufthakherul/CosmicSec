services:
  # Traefik - edge API gateway / reverse proxy
  traefik:
    image: traefik:v3.4
    container_name: cosmicsec-traefik
    command: --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infrastructure/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infrastructure/traefik-dynamic.yml:/etc/traefik/dynamic/traefik-dynamic.yml:ro
      - traefik_acme:/acme
      - traefik_logs:/var/log/traefik
    networks:
      - cosmicsec-network

  # Consul - service discovery
  consul:
    image: hashicorp/consul:1.20
    container_name: cosmicsec-consul
    command: "agent -server -ui -bootstrap-expect=1 -client=0.0.0.0"
    ports:
      - "8500:8500"
    networks:
      - cosmicsec-network

  # PostgreSQL - Primary database
  postgres:
    image: postgres:17-alpine
    container_name: cosmicsec-postgres
    environment:
      POSTGRES_DB: cosmicsec
      POSTGRES_USER: cosmicsec
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cosmicsec_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cosmicsec" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cosmicsec-network

  # Redis - Cache and message broker
  redis:
    image: redis:7-alpine
    container_name: cosmicsec-redis
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:-cosmicsec_redis_password}
    volumes:
      - redis_data:/data
      - ./infrastructure/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cosmicsec-network

  # MongoDB - OSINT and unstructured data
  mongodb:
    image: mongo:8
    container_name: cosmicsec-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: cosmicsec
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-cosmicsec_mongo_password}
      MONGO_INITDB_DATABASE: cosmicsec
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - cosmicsec-network

  # Elasticsearch - Logs and search
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.0
    container_name: cosmicsec-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - cosmicsec-network

  # RabbitMQ - Message queue for distributed tasks
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cosmicsec-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: cosmicsec
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-cosmicsec_rabbitmq_password}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - cosmicsec-network

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    container_name: cosmicsec-api-gateway
    environment:
      - DATABASE_URL=postgresql://cosmicsec:${POSTGRES_PASSWORD:-cosmicsec_dev_password}@postgres:5432/cosmicsec
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cosmicsec_redis_password}@redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev_secret_key_change_in_production}
      - COSMICSEC_STORAGE_MODE=${COSMICSEC_STORAGE_MODE:-dynamic}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      scan-service:
        condition: service_healthy
    networks:
      - cosmicsec-network
    command: uvicorn services.api_gateway.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 25s
    labels:
      - traefik.enable=true
      - traefik.http.routers.cosmicsec-gateway.rule=PathPrefix(`/api`) || PathPrefix(`/health`) || PathPrefix(`/ws`)
      - traefik.http.routers.cosmicsec-gateway.entrypoints=web
      - traefik.http.routers.cosmicsec-gateway.middlewares=security-headers@file,rate-limit@file,cors-api@file
      - traefik.http.services.cosmicsec-gateway.loadbalancer.server.port=8000

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: services/auth_service/Dockerfile
    container_name: cosmicsec-auth-service
    environment:
      - DATABASE_URL=postgresql://cosmicsec:${POSTGRES_PASSWORD:-cosmicsec_dev_password}@postgres:5432/cosmicsec
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cosmicsec_redis_password}@redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev_secret_key_change_in_production}
      - COSMICSEC_STORAGE_MODE=${COSMICSEC_STORAGE_MODE:-dynamic}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - cosmicsec-network
    command: uvicorn services.auth_service.main:app --host 0.0.0.0 --port 8001
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 25s
    labels:
      - traefik.enable=true
      - traefik.http.routers.cosmicsec-auth.rule=PathPrefix(`/auth`)
      - traefik.http.routers.cosmicsec-auth.entrypoints=web
      - traefik.http.services.cosmicsec-auth.loadbalancer.server.port=8001

  # Scan Service
  scan-service:
    build:
      context: .
      dockerfile: services/scan_service/Dockerfile
    container_name: cosmicsec-scan-service
    environment:
      - DATABASE_URL=postgresql://cosmicsec:${POSTGRES_PASSWORD:-cosmicsec_dev_password}@postgres:5432/cosmicsec
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cosmicsec_redis_password}@redis:6379/0
      - MONGODB_URL=mongodb://cosmicsec:${MONGO_PASSWORD:-cosmicsec_mongo_password}@mongodb:27017/cosmicsec
      - RABBITMQ_URL=amqp://cosmicsec:${RABBITMQ_PASSWORD:-cosmicsec_rabbitmq_password}@rabbitmq:5672/
      - COSMICSEC_STORAGE_MODE=${COSMICSEC_STORAGE_MODE:-dynamic}
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cosmicsec-network
    command: uvicorn services.scan_service.main:app --host 0.0.0.0 --port 8002
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 25s
    labels:
      - traefik.enable=true
      - traefik.http.routers.cosmicsec-scan.rule=PathPrefix(`/scan`)
      - traefik.http.routers.cosmicsec-scan.entrypoints=web
      - traefik.http.services.cosmicsec-scan.loadbalancer.server.port=8002

  # AI Service (Phase 2 — ChromaDB + MITRE ATT&CK + LangChain)
  ai-service:
    build:
      context: .
      dockerfile: services/ai_service/Dockerfile
    container_name: cosmicsec-ai-service
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - CHROMA_PERSIST_DIR=/tmp/cosmicsec_chroma
    ports:
      - "8003:8003"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cosmicsec-network
    volumes:
      - chroma_data:/tmp/cosmicsec_chroma
    command: uvicorn services.ai_service.main:app --host 0.0.0.0 --port 8003
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 25s

  # Recon Service
  recon-service:
    build:
      context: .
      dockerfile: services/recon_service/Dockerfile
    container_name: cosmicsec-recon-service
    environment:
      - SHODAN_API_KEY=${SHODAN_API_KEY:-}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY:-}
    ports:
      - "8004:8004"
    networks:
      - cosmicsec-network
    command: uvicorn services.recon_service.main:app --host 0.0.0.0 --port 8004
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 25s

  # Report Service
  report-service:
    build:
      context: .
      dockerfile: services/report_service/Dockerfile
    container_name: cosmicsec-report-service
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8005:8005"
    networks:
      - cosmicsec-network
    command: uvicorn services.report_service.main:app --host 0.0.0.0 --port 8005
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 25s

  # Collab Service — Phase 2 real-time team collaboration
  collab-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmicsec-collab-service
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8006:8006"
    networks:
      - cosmicsec-network
    command: uvicorn services.collab_service.main:app --host 0.0.0.0 --port 8006
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8006/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.http.routers.cosmicsec-collab.rule=PathPrefix(`/collab`)
      - traefik.http.routers.cosmicsec-collab.entrypoints=web
      - traefik.http.services.cosmicsec-collab.loadbalancer.server.port=8006

  # Plugin Registry — Phase 2 plugin SDK management
  plugin-registry:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmicsec-plugin-registry
    environment:
      - COSMICSEC_PLUGIN_DIRS=/app/plugins/official:/opt/cosmicsec/plugins
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8007:8007"
    networks:
      - cosmicsec-network
    volumes:
      - plugin_data:/opt/cosmicsec/plugins
    command: uvicorn plugins.registry:app --host 0.0.0.0 --port 8007
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8007/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.http.routers.cosmicsec-plugins.rule=PathPrefix(`/plugins`)
      - traefik.http.routers.cosmicsec-plugins.entrypoints=web
      - traefik.http.services.cosmicsec-plugins.loadbalancer.server.port=8007

  # Integration Service — Phase 3 integration hub
  integration-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmicsec-integration-service
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8008:8008"
    networks:
      - cosmicsec-network
    command: uvicorn services.integration_service.main:app --host 0.0.0.0 --port 8008
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8008/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.http.routers.cosmicsec-integration.rule=PathPrefix(`/integration`)
      - traefik.http.routers.cosmicsec-integration.entrypoints=web
      - traefik.http.services.cosmicsec-integration.loadbalancer.server.port=8008

  # Bug Bounty Service — Phase 5 foundation
  bugbounty-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmicsec-bugbounty-service
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8009:8009"
    networks:
      - cosmicsec-network
    command: uvicorn services.bugbounty_service.main:app --host 0.0.0.0 --port 8009
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8009/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.http.routers.cosmicsec-bugbounty.rule=PathPrefix(`/bugbounty`)
      - traefik.http.routers.cosmicsec-bugbounty.entrypoints=web
      - traefik.http.services.cosmicsec-bugbounty.loadbalancer.server.port=8009

  # Phase 5 Advanced Service
  phase5-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmicsec-phase5-service
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8010:8010"
    networks:
      - cosmicsec-network
    command: uvicorn services.phase5_service.main:app --host 0.0.0.0 --port 8010
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8010/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.http.routers.cosmicsec-phase5.rule=PathPrefix(`/phase5`)
      - traefik.http.routers.cosmicsec-phase5.entrypoints=web
      - traefik.http.services.cosmicsec-phase5.loadbalancer.server.port=8010

  # Agent Relay — Phase D CLI agent WebSocket hub
  agent-relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmicsec-agent-relay
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8011:8011"
    networks:
      - cosmicsec-network
    command: uvicorn services.agent_relay.main:app --host 0.0.0.0 --port 8011
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8011/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.http.routers.cosmicsec-agent-relay.rule=PathPrefix(`/relay`) || PathPrefix(`/ws/relay`)
      - traefik.http.routers.cosmicsec-agent-relay.entrypoints=web
      - traefik.http.routers.cosmicsec-agent-relay.priority=20
      - traefik.http.services.cosmicsec-agent-relay.loadbalancer.server.port=8011

  # Notification Service — Phase E event notifications
  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmicsec-notification-service
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8012:8012"
    networks:
      - cosmicsec-network
    command: uvicorn services.notification_service.main:app --host 0.0.0.0 --port 8012
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8012/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.http.routers.cosmicsec-notification.rule=PathPrefix(`/notify`)
      - traefik.http.routers.cosmicsec-notification.entrypoints=web
      - traefik.http.services.cosmicsec-notification.loadbalancer.server.port=8012

  # Celery Worker - Background tasks
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmicsec-celery-worker
    command: celery -A services.scan_service.main:celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://cosmicsec:${POSTGRES_PASSWORD:-cosmicsec_dev_password}@postgres:5432/cosmicsec
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cosmicsec_redis_password}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-cosmicsec_redis_password}@redis:6379/0
      - CELERY_BACKEND_URL=redis://:${REDIS_PASSWORD:-cosmicsec_redis_password}@redis:6379/0
      - RABBITMQ_URL=amqp://cosmicsec:${RABBITMQ_PASSWORD:-cosmicsec_rabbitmq_password}@rabbitmq:5672/
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import celery,sys;sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - cosmicsec-network

  # Frontend dashboard
  frontend:
    image: node:22-alpine
    container_name: cosmicsec-frontend
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      - VITE_API_BASE_URL=http://api-gateway:8000
    ports:
      - "3000:3000"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - cosmicsec-network
    volumes:
      - ./:/app

  # Prometheus — metrics collection
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: cosmicsec-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - cosmicsec-network

  # Grafana — dashboards
  grafana:
    image: grafana/grafana:11.6.0
    container_name: cosmicsec-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-cosmicsec_grafana_password}
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infrastructure/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - cosmicsec-network

  # Loki — log aggregation
  loki:
    image: grafana/loki:3.5.0
    container_name: cosmicsec-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - cosmicsec-network

  # -------------------------------------------------------------------------
  # Phase P — Rust High-Performance Ingest Engine
  # -------------------------------------------------------------------------
  ingest:
    build:
      context: ./ingest
      dockerfile: Dockerfile
    container_name: cosmicsec-ingest
    environment:
      - DATABASE_URL=postgresql://cosmicsec:${POSTGRES_PASSWORD:-cosmicsec_dev_password}@postgres:5432/cosmicsec
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cosmicsec_redis_password}@redis:6379/0
      - GRPC_PORT=50051
      - HTTP_PORT=8099
      - LOG_LEVEL=info
      - COSMICSEC_USE_RUST_INGEST=${COSMICSEC_USE_RUST_INGEST:-false}
    ports:
      - "50051:50051"   # gRPC — IngestService
      - "8099:8099"     # HTTP  — /health /metrics /ready
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8099/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - cosmicsec-network
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Phase T — NATS JetStream message broker
  # -------------------------------------------------------------------------
  nats:
    image: nats:2.10-alpine
    container_name: cosmicsec-nats
    command:
      - "--jetstream"
      - "--store_dir=/data"
      - "--http_port=8222"
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cosmicsec-network
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Phase T — Go Event Broker (Redis Streams ↔ NATS JetStream bridge)
  # -------------------------------------------------------------------------
  broker:
    build:
      context: ./broker
      dockerfile: Dockerfile
    container_name: cosmicsec-broker
    environment:
      - NATS_URL=nats://nats:4222
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-cosmicsec_redis_password}
      - BROKER_HTTP_PORT=8090
      - LOG_LEVEL=info
    ports:
      - "8090:8090"   # HTTP — /health /ready /metrics
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - cosmicsec-network
    restart: unless-stopped

networks:
  cosmicsec-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  elasticsearch_data:
  rabbitmq_data:
  chroma_data:
  plugin_data:
  traefik_acme:
  traefik_logs:
  prometheus_data:
  grafana_data:
  loki_data:
  nats_data:
